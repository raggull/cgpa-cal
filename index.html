<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator — Sign In</title>
<link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@500;600&display=swap"
  rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --gD: #1b5e20;
    --gK: #2e7d32;
    --gM: #388e3c;
    --gB: #4caf50;
    --gL: #66bb6a;
    --gLr: #a5d6a7;
    --gLt: #e8f5e9;
    --gP: #f4f7f4;
    --td: #1a2e1a;
    --tmu: #5a7a5a;
    --tdi: #8aab8a;
    --red: #dc2626;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: #7bbc7e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }

  body::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: rgba(27, 94, 32, .15);
    border-radius: 50%;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: -15%;
    left: -8%;
    width: 400px;
    height: 400px;
    background: rgba(27, 94, 32, .12);
    border-radius: 50%;
  }

  .lc {
    width: 420px;
    max-width: 100%;
    background: var(--gLt);
    border-radius: 30px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, .25);
    padding: 44px 36px;
    position: relative;
    overflow: hidden;
    animation: lf .8s ease;
    z-index: 1;
  }

  @keyframes lf {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .lc::before {
    content: '';
    position: absolute;
    top: -130px;
    right: -130px;
    width: 260px;
    height: 260px;
    background: var(--gD);
    border-radius: 50%;
  }

  .lc::after {
    content: '';
    position: absolute;
    bottom: -130px;
    left: -100px;
    width: 220px;
    height: 220px;
    background: var(--gD);
    border-radius: 50%;
  }

  .ll { text-align: center; margin-bottom: 6px; position: relative; z-index: 1; }

  .llogo {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: var(--gD);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    margin: 0 auto 10px;
  }

  .lb {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gD);
    display: block;
  }

  .lt {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--tmu);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: block;
    margin-bottom: 22px;
  }

  .lh {
    font-size: 22px;
    font-weight: 700;
    color: var(--td);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .lsub {
    font-size: 13px;
    color: var(--tmu);
    line-height: 1.5;
    margin-bottom: 26px;
    position: relative;
    z-index: 1;
  }

  .le {
    background: rgba(239, 68, 68, .1);
    border: 1px solid rgba(239, 68, 68, .25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  #googleBtnWrap { display: flex; justify-content: center; min-height: 44px; position: relative; z-index: 1; }

  #googleNote {
    display: none;
    font-size: 12px;
    color: var(--tmu);
    text-align: center;
    font-family: var(--font-mono);
    position: relative;
    z-index: 1;
    margin-top: 10px;
  }

  #spinWrap {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    color: var(--gD);
    font-weight: 600;
    font-size: 14px;
    position: relative;
    z-index: 1;
  }

  .spin {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(27, 94, 32, .25);
    border-top-color: var(--gD);
    border-radius: 50%;
    animation: sp .6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes sp { to { transform: rotate(360deg); } }

  .domain-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #fff;
    border: 1.8px solid var(--gLr);
    border-radius: 25px;
    padding: 9px 18px;
    margin-top: 22px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--gK);
    position: relative;
    z-index: 1;
  }

  footer.credit {
    text-align: center;
    font-size: 11.5px;
    color: rgba(255, 255, 255, .9);
    margin-top: 22px;
    position: relative;
    z-index: 1;
    font-family: var(--font-mono);
    letter-spacing: .02em;
  }

  body { -webkit-user-select: none; -moz-user-select: none; user-select: none; }
</style>
</head>
<body>

  <div class="lc">
    <div class="ll">
      <div class="llogo">&Sigma;</div>
      <span class="lb">CGPA Calculator</span>
      <span class="lt">CSE &middot; RAGUL A</span>
    </div>

    <div class="lh">Sign In</div>
    <div class="lsub">Sign in with your Sri Shakthi college Google account.</div>

    <div class="le" id="signinErr"></div>

    <div id="spinWrap"><div class="spin"></div><span>Signing in…</span></div>
    <div id="googleBtnWrap"></div>
    <div id="googleNote">Google server not reachable, contact admin.</div>

    <div class="domain-note">&#128274; Restricted to @srishakthi.ac.in accounts</div>
  </div>

<script>
  // ---- Session ----------------------------------------------------------
  function getToken() { return localStorage.getItem('cgpa_token'); }
  function saveSession(token, user) {
    localStorage.setItem('cgpa_token', token);
    localStorage.setItem('cgpa_user', JSON.stringify(user));
  }

  const signinErr = document.getElementById('signinErr');
  const spinWrap = document.getElementById('spinWrap');
  const googleBtnWrap = document.getElementById('googleBtnWrap');

  // Bounced back here because the 30-minute session expired.
  (function showExpiredNotice() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('expired') === '1') {
      signinErr.textContent = 'Your session expired after 30 minutes. Please sign in again.';
      signinErr.style.display = 'block';
      history.replaceState({}, '', '/');
    }
  })();

  // Already signed in with a still-valid token? Skip straight to the calculator.
  (async function checkExistingSession() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        window.location.replace('/cgpa.html');
      } else {
        localStorage.removeItem('cgpa_token');
        localStorage.removeItem('cgpa_user');
      }
    } catch (err) { /* offline — let them sign in again */ }
  })();

  // ---- Sign in with Google ------------------------------------------------
  async function handleGoogleCredential(response) {
    signinErr.style.display = 'none';
    googleBtnWrap.style.display = 'none';
    spinWrap.style.display = 'flex';
    try {
      const res = await fetch('/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Google sign-in failed.');
      saveSession(data.token, data.user);
      window.location.href = '/cgpa.html';
    } catch (err) {
      signinErr.textContent = err.message;
      signinErr.style.display = 'block';
      spinWrap.style.display = 'none';
      googleBtnWrap.style.display = 'flex';
    }
  }

  (async function initGoogle() {
    try {
      const res = await fetch('/api/auth/config');
      const data = await res.json();
      if (!data.googleClientId) {
        document.getElementById('googleNote').style.display = 'block';
        return;
      }
      const render = () => {
        google.accounts.id.initialize({
          client_id: data.googleClientId,
          callback: handleGoogleCredential,
          hd: 'srishakthi.ac.in'
        });
        google.accounts.id.renderButton(googleBtnWrap, {
          theme: 'filled_black', size: 'large', width: 320, text: 'signin_with'
        });
      };
      if (window.google && window.google.accounts) render();
      else window.addEventListener('load', render);
    } catch (err) {
      document.getElementById('googleNote').style.display = 'block';
    }
  })();
</script>
</body>
</html>
